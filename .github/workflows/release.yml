name: Release to LuaRocks

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Publish to LuaRocks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.4"

      - name: Install LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install JSON library
        run: |
          luarocks install dkjson

      - name: Prepare rockspec
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed "s/version = \"scm-1\"/version = \"${VERSION}-1\"/" jade-scm-1.rockspec > jade-${VERSION}-1.rockspec
          sed -i "s|url = \".*\"|url = \"git://github.com/AlehandroSV/Jade.git\",\\n    tag = \\\"${GITHUB_REF_NAME}\\\",\\n    dir = \\\"Jade\\\"|" jade-${VERSION}-1.rockspec

      - name: Inject version into _VERSION.lua
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/return \"scm\"/return \"${VERSION}\"/" src/jade/_VERSION.lua
          echo "Version set to ${VERSION}"

      - name: Upload to LuaRocks
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Uploading jade ${VERSION} to LuaRocks..."
          luarocks upload jade-${VERSION}-1.rockspec --api-key="$LUAROCKS_API_KEY"
